name: Veracode IaC/Secrets Scanning

run-name: Veracode IaC/Secrets Scanning - ${{ github.event.client_payload.repository.name }}

concurrency:
  group: ${{ github.event.client_payload.event_type }}-${{ github.event.client_payload.repository.name }}-${{ github.event.client_payload.repository.branch }}
  cancel-in-progress: true

on:
  repository_dispatch:
    types: [veracode-iac-secrets-scan]
    
jobs:
  cleanup:
    uses: ./.github/workflows/veracode-clean-up.yml
    with:
      runs_on: ${{ github.event.client_payload.user_config.default_runs_on }}

  register:
    needs: cleanup
    uses: ./.github/workflows/veracode-check-run.yml
    with:
      check_run_name: ${{ github.workflow }}
      head_sha: ${{ github.event.client_payload.sha }}
      repositroy_owner: ${{ github.event.client_payload.repository.owner }}
      repositroy_name: ${{ github.event.client_payload.repository.name }}
      event_type: ${{ github.event.client_payload.event_type }}
      github_token: ${{ github.event.client_payload.token }}
      run_id: ${{ github.run_id }}
      branch: ${{ github.event.client_payload.repository.branch }}
      default_runs_on: ${{ github.event.client_payload.user_config.default_runs_on }}

  validations:
    needs: register
    runs-on: ${{ fromJson(github.event.client_payload.user_config.default_runs_on) }}
    name: Validations
    steps:
      - name: Verify Veracode API credentials
        id: verify_api_creds
        uses: Veracode/github-actions-integration-helper@v0.1.9
        with:
          action: validateVeracodeApiCreds
          token: ${{ github.event.client_payload.token }}
          vid: ${{ secrets.VERACODE_API_ID }}
          vkey: ${{ secrets.VERACODE_API_KEY }}
          appname: ${{ github.event.client_payload.user_config.profile_name }}
          source_repository: ${{ github.event.client_payload.repository.full_name }}
          check_run_id: ${{ needs.register.outputs.run_id }}

  runs_on_validations:
    needs: validations
    runs-on: ${{ fromJson(github.event.client_payload.user_config.default_runs_on) }}
    name: Runner Validations
    outputs:
      override-build-runs-on: ${{ steps.select-runs-on-action.outputs.build-runs-on }}
      override-default-runs-on: ${{ steps.select-runs-on-action.outputs.default-runs-on }}

    steps:     
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24.14.0

      - name: Verify Runner Mappings
        id: select-runs-on-action
        env:
          INPUT_BUILD-RUNS-ON: ${{ github.event.client_payload.user_config.build_runs_on }}
          INPUT_CONFIG-REPOSITORY: veracode
          INPUT_DEFAULT-RUNS-ON: ${{ github.event.client_payload.user_config.default_runs_on }}
          INPUT_GITHUB-TOKEN: ${{ github.event.client_payload.token }}
          INPUT_OWNER: ${{ github.event.client_payload.repository.owner }}
          INPUT_REF: ''
          INPUT_REPOSITORY: ${{ github.event.client_payload.repository.name }}
          INPUT_RUNS-ON-MAPPING-YAML: runs-on-mapping.yaml
        run: |
          node scripts/select-runs-on-action.js
  
  veracode-iac-secrets-scan:
    needs: [runs_on_validations, register, validations]
    runs-on: ${{ fromJson(needs.runs_on_validations.outputs.override-default-runs-on) }}
    name: Veracode IaC/Secrets Scanning

    steps:
      - uses: actions/checkout@v4
        with:
          repository: ${{ github.event.client_payload.repository.full_name }}
          ref: ${{ github.event.client_payload.sha }}
          token: ${{ github.event.client_payload.token }}

      - name: Run Veracode IaC/Secrets Scanning
        uses: veracode/container_iac_secrets_scanning@v1.0.7
        with:
            vid: ${{ secrets.VERACODE_API_ID }}
            vkey: ${{ secrets.VERACODE_API_KEY }}
            command: "scan" 
            type: "directory"
            source: "./"
            format: "json"
            debug: ${{ github.event.client_payload.user_config.debug }}
            fail_build: ${{ github.event.client_payload.user_config.break_build_policy_findings }}
            fail_build_on_error: ${{ github.event.client_payload.user_config.break_build_on_error }}
